<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bad Apple 视频播放</title>
    <style>
        /* 彻底重置内外边距，让视频占满整个屏幕 */
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000; /* 黑色背景，视频未加载时更美观 */
            overflow: hidden; /* 防止滚动条出现 */
        }
        /* 视频容器：强制撑满视口，无留白 */
        .video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        /* 视频元素：填满容器，保持比例，自动居中 */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持宽高比，不留黑边（若屏幕比例不同，会留黑边但不会裁剪） */
            background: #000;
            display: block;
        }
        /* 移除默认控件样式干扰（保留控件功能） */
        video::-webkit-media-controls {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video 
            id="myVideo"
            src="https://raw.githubusercontent.com/fanchuanhaha/debian-server-auto-install-desktop-and-vnc-and-set-enable/refs/heads/main/badapple.mp4"
            controls          /* 显示播放/暂停、进度条、音量等控件 */
            autoplay          /* 自动播放（大部分浏览器会遵循，但部分需用户交互） */
            playsinline       /* 在iOS Safari中内联播放，不强制全屏 */
            muted             /* 静音自动播放策略：很多浏览器要求自动播放必须静音，加上此属性可提升兼容性 */
        ></video>
    </div>

    <script>
        // 可选：额外的自动播放保障，若因策略失败，尝试静音重播
        (function() {
            const video = document.getElementById('myVideo');
            
            // 如果自动播放被阻止，监听用户任意点击时尝试播放
            document.addEventListener('click', function() {
                if (video.paused) {
                    video.play().catch(e => console.warn('播放失败:', e));
                }
            }, { once: false });

            // 视频加载完成后，尝试自动播放（部分浏览器会在加载完成后才允许）
            video.addEventListener('loadedmetadata', function() {
                video.play().catch(e => console.warn('自动播放被阻止，点击页面即可播放。'));
            });

            // 解决部分浏览器（如Safari）需要用户手势才能播放的问题，页面一加载就尝试
            window.addEventListener('load', function() {
                setTimeout(() => {
                    video.play().catch(() => {});
                }, 100);
            });
        })();
    </script>
</body>
</html>
